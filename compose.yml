services:

  app:
    build: .
    ports:
      - "8000:8000"
    networks:
      - app_network
    environment:
      - DB_URL=${DB_URL}
    depends_on:
       db: 
        condition: service_healthy
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
